<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ross Perry Systems Architecture Portfolio</title>
  <desc id="desc">Open Graph card for Ross Perry's pre-sales systems architecture portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081f3d"/>
      <stop offset="100%" stop-color="#184f74"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#77d3c6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="110" r="170" fill="#77d3c6" fill-opacity="0.12"/>
  <circle cx="180" cy="520" r="220" fill="#ead7b5" fill-opacity="0.16"/>
  <rect x="72" y="72" width="1056" height="486" rx="34" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="110" y="168" fill="#ead7b5" font-size="28" font-family="Segoe UI, Arial, sans-serif" letter-spacing="4">PRE-SALES SYSTEMS ARCHITECTURE</text>
  <text x="110" y="270" fill="#ffffff" font-size="68" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Ross Perry</text>
  <text x="110" y="350" fill="#d9ebff" font-size="38" font-family="Segoe UI, Arial, sans-serif">From LGR title to solutions-architecture impact</text>
  <text x="110" y="438" fill="#ffffff" font-size="28" font-family="Segoe UI, Arial, sans-serif">Workflow automation | Prompt engineering | RFP strategy | Business translation</text>
  <rect x="110" y="470" width="270" height="58" rx="29" fill="#ffffff"/>
  <text x="245" y="507" text-anchor="middle" fill="#081f3d" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">30-40% Time Reduction</text>
