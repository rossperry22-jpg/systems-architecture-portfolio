<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">HPE Workflow Automation Diagram</title>
  <desc id="desc">A simplified diagram showing Salesforce, RingDNA, and Outlook flowing into a dashboard-led operating layer and producing business outcomes.</desc>
  <defs>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081f3d"/>
      <stop offset="100%" stop-color="#23827b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="420" rx="30" fill="#f6f7fb"/>
  <rect x="40" y="96" width="180" height="86" rx="18" fill="#ffffff" stroke="#123766" stroke-opacity="0.16"/>
  <text x="130" y="145" text-anchor="middle" fill="#081f3d" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Salesforce</text>
  <rect x="40" y="220" width="180" height="86" rx="18" fill="#ffffff" stroke="#123766" stroke-opacity="0.16"/>
  <text x="130" y="269" text-anchor="middle" fill="#081f3d" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">RingDNA</text>
  <rect x="680" y="96" width="180" height="86" rx="18" fill="#ffffff" stroke="#123766" stroke-opacity="0.16"/>
  <text x="770" y="145" text-anchor="middle" fill="#081f3d" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Outcome</text>
  <rect x="680" y="220" width="180" height="86" rx="18" fill="#ffffff" stroke="#123766" stroke-opacity="0.16"/>
  <text x="770" y="268" text-anchor="middle" fill="#081f3d" font-size="22" font-family="Segoe UI, Arial, sans-serif">30-40% less manual entry</text>
  <rect x="270" y="120" width="360" height="164" rx="26" fill="url(#core)"/>
  <text x="450" y="170" text-anchor="middle" fill="#ffffff" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Shared Operating Layer</text>
  <text x="450" y="215" text-anchor="middle" fill="#d9ebff" font-size="22" font-family="Segoe UI, Arial, sans-serif">Prompt frameworks | Routing | Dashboard visibility</text>
  <text x="450" y="250" text-anchor="middle" fill="#d9ebff" font-size="22" font-family="Segoe UI, Arial, sans-serif">Reusable automation patterns</text>
  <path d="M220 139 H270" stroke="#23827b" stroke-width="8" stroke-linecap="round"/>
  <path d="M220 263 H270" stroke="#23827b" stroke-width="8" stroke-linecap="round"/>
  <path d="M630 170 H680" stroke="#23827b" stroke-width="8" stroke-linecap="round"/>
  <path d="M630 250 H680" stroke="#23827b" stroke-width="8" stroke-linecap="round"/>
  <rect x="40" y="20" width="180" height="48" rx="16" fill="#ffffff" stroke="#123766" stroke-opacity="0.16"/>
  <text x="130" y="51" text-anchor="middle" fill="#081f3d" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Outlook</text>
  <path d="M220 44 H360 V120" stroke="#23827b" stroke-width="8" stroke-linecap="round" fill="none"/>
</svg>
